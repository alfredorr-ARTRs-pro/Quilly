name: Release

# Triggered when you push a version tag, for example:
# git tag v1.0.0 public-main && git push public v1.0.0
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build Windows release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Build Windows installer and portable zip
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # SignPath Foundation signing step - enable once the project is approved.
      #
      # - name: Sign installer via SignPath
      #   uses: signpath/github-action-submit-signing-request@v1
      #   with:
      #     api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
      #     organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
      #     project-slug: quilly
      #     signing-policy-slug: release-signing
      #     artifact-configuration-slug: installer
      #     github-artifact-id: release
      #     wait-for-completion: true
      #     output-artifact-directory: release

      - name: Compute SHA-256 checksums
        shell: pwsh
        run: |
          $releaseFiles = Get-ChildItem -Path "release" -File | Where-Object { $_.Extension -in ".exe", ".zip" }
          foreach ($file in $releaseFiles) {
            $hash = Get-FileHash -Algorithm SHA256 $file.FullName
            "$($hash.Hash)  $($file.Name)" | Out-File -FilePath "release/$($file.Name).sha256" -Encoding ascii
            Write-Host "SHA-256 ($($file.Name)): $($hash.Hash)"
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.zip
            release/*.sha256
          generate_release_notes: false
          draft: false
          prerelease: false
          body: |
            ## Quilly ${{ github.ref_name }}

            This is the first public release of Quilly, a Windows desktop app for turning speech into text and sending it where you need it with minimal friction.

            ### Downloads

            - **Windows installer:** download the `Quilly-V-*-Setup.exe` asset for the standard installation experience.
            - **Portable ZIP:** download the `Quilly-V-*-Portable.zip` asset if you prefer to unpack and run Quilly without an installer.
            - **Checksums:** each download includes a matching `.sha256` file for verification.

            ### Highlights

            - Local-first voice transcription workflow for Windows.
            - Desktop tray integration for quick access.
            - Audio import, review, and correction tools.
            - Optional local AI setup for enhanced processing.

            ### Important note

            This first public build is not code-signed yet. Windows SmartScreen may show a warning until the installer earns reputation or signing is enabled. If you see that warning, choose **More info** and then **Run anyway** only if you downloaded Quilly from this official release page.

            ### Verify your download

            From PowerShell, run:

            ```powershell
            Get-FileHash .\Quilly-V-*-Setup.exe -Algorithm SHA256
            ```

            Compare the result with the matching `.sha256` file attached to this release.

            ---

